<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字型Number</title>
    <script>
        var num = 10; //num 数字型
        var PI = 3.14; //PI 数字型
        // 1.八进制 0-7  程序里面加0表示八进制
        var num1 = 010;
        console.log(num1);  //010  八进制转化为十进制就是8
        var num2 = 012;
        console.log(num2);
        //2.十六进制 0-9 a-f #ffffff 前面加0x表示十六进制
        var num3 = 0x12;
        console.log(num3);
        var num4 = 0xa;
        console.log(num4);
        //数字型的最大值
        console.log(Number.MAX_VALUE);
        //数字型的最小值
        console.log(Number.MIN_VALUE);
        //无穷大Infinity
        console.log(Number.MAX_VALUE*5);
        //无穷小Infinity    非数字NaN

    </script>
</head>

</body>
</html>
