<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>html,val, text demo</title>
  <style>
  p {
    margin: 8px;
    font-size: 20px;
    cursor: pointer;
  }
  b {
    text-decoration: underline;
	color: red;
  }
  </style>
  <script src="js/jquery-1.11.3.js"></script>
</head>
<body>
 
<p>
  <b>jQuery</b> 是最好用的<span id="tag">JavaScript</span>库
</p>
<p id="text_output">
  
</p>
<p id="html_output">
  
</p>
<label for="gender" id="city1_label">性别： </label>
<input id="gender" type="text" value="男">
<button>点我修改性别</button>
<script>
$( "p" ).click(function() {
  var textString = $( this ).text();
  $( "#text_output" ).text( textString );
});
$( "p" ).click(function() {
  var htmlString = $( this ).html();
  $( "#html_output" ).text( htmlString );
});


$("button").click(function(){
  $(this).prev().val("女");
});
</script>
</body>
</html>
