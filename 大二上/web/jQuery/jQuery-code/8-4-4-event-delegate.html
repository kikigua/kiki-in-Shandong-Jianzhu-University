<!doctype html>
<html>
<head>
    <style>
    ul{
        list-style: none;
        display: flex;    
    }
    ul li{
        width: 50px;
        height: 50px;
        line-height: 50px;
        text-align: center;
        background: yellow;
        font-weight: bold;
        border: 1px solid #eee;
    }
    ul li:hover{
        cursor: pointer;
    }
</style>
</head>
<body>
    <div>
        <ul>
            <li>1</li>
            <li>2</li>
            <li>3</li>
            <li>4</li>
            <li>5</li>
        </ul>
    </div>
</body>
<script src="js/jquery-1.11.3.js"></script> 
<script>
    $('ul').append('<li>6</li>');
    //ul是已经存在的
    $('ul').on('click','li',function(){//这里改为用on()方法，第6个li也有了点击事件
        alert($(this).text());          
    });
</script>
</body>
</html>
