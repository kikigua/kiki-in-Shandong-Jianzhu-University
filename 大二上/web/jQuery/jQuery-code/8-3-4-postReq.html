<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>XMLHTTPRequest对象</title>
  <style>
    #plArea{
		height: 300px;
		background:#eee;
		margin-top:5px;
		padding:20px;
		width:1000px;
		margin: 0 auto;
	}
    #plItem li{
		display:table;
		width:920px;
		margin-bottom:20px;
		padding-bottom:10px;
		border-bottom:1px solid #ddd;
	}
	#plItem li>b{
		color: red;
	}
	#plItem li>span{
		margin-left:10px;
		font-size:14px;
	}
	#plItem li>p{
		margin-top:20px;
		font-size:14px;
	}
	#plItem div{
		width:40px;
		float:right;
		
	}
	#plItem div.like>img{
		width: 20px;
		height:20px;
	}
  </style> 
</head>
<body>
  <div id="plArea">  
	<ul id="plItem">   
        
	</ul>
</div>
<script src="js/jquery-1.11.3.js"></script>
<script src="js/common.js"></script>
<script>
    function loadData(){
	  $.get("data/getComment.php").then(resData=>{
		var html="";
		for(var i=0;i<resData.length;i++){
			var p=resData[i];
			html+=`
			<li><b>${p.uname}</b><span>${p.fdate}</span>
			<p>${p.comm}</p>
			<div class="like"><img src="img/like.png"/>
			<span>${p.likesCount}</span>
			</div></li>`;
		}
		$("#plItem").html(html);
	  })
   }
   
    function postRequest(url,cc){
	    //1. 创建xhr对象
		var xhr = createXhr();
		//2.创建一个请求
		xhr.open("post",url,true);
		//3. 状态监听：设置回调函数
		xhr.onreadystatechange = function(){
		    //判断readyState以及status
		    if (xhr.readyState == 4 && xhr.status == 200)
			{
			    //接收响应数据
				var resultText = xhr.responseText;
				//console.log(resultText);
			}
		}
		//增加：更改请求消息头
		xhr.setRequestHeader("Content-Type","application/x-www-form-urlencoded");
		//发送请求
		var uname = cc[0].uname;
		var fdate = cc[0].fdate;
		var comm = cc[0].comm;
		var likesCount = cc[0].likesCount;
		//请求主体
		var msg="uname="+uname+"&fdate="+fdate+"&comm="+comm+"&likesCount="+likesCount;
		xhr.send(msg);
    }
   
   $("#plItem").on("click",'img',function(){
	  var num=$(this).next().text();
	  var uname = $(this).parent().prev().prev().prev().text();
	  var fdate = $(this).parent().prev().prev().text();
	  var comm = $(this).parent().prev().text();
	  num++;
	  var newComment = [];
	  var newComm = new Object();
	  newComm.uname = uname;
	  newComm.fdate = fdate;
	  newComm.comm = comm;
	  newComm.likesCount = num;
	  newComment.push(newComm);
	  var json_comm = JSON.stringify(newComment);
	  var update = JSON.parse(json_comm);
	  var url = "data/updateComment.php";
	  postRequest(url,update);
	  loadData();
   });
   
   $(function(){
	loadData();
   }); 
</script>
</body>
</html>
