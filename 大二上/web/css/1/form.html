<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>The Starbuzz Bean Machine</title>
  </head>
  <body>

    <h1>The Starbuzz Bean Machine</h1>
    <h2>Fill out the form below and click submit to order</h2>
	<form action="https://starbuzzcoffee.com/processorder.php" method="post">
		<div class="tableRow">
			<p>
				Choose your beans:
			</p>
			<p>
				<select name="beans">
					<option value="House Blend">House Blend</option>
					<option value="Bolivia">Bolivia</option>
					<option value="Guatemala">Guatemala</option>
					<option value="Kenya">Kenya</option>
				</select>
			</p>
		</div>
		
		<div class="tableRow">
			<p>
				Type:
			</p>
			<p>
				<input type="radio" name="beantype" value="whole">Whole bean<br />
				<input type="radio" name="beantype" value="ground" checked>Ground
			</p>
		</div>
			
		<div class="tableRow">
			<p>
				Number of bags:
			</p>
			<p>
				<input type="number" name="bags" min="0" max="10">
			</p>
		</div>
		
		<div class="tableRow label">
			<p>
				Must arrive by date:
			</p>
			<p>
				<input type="date" name="date">
			</p>
		</div>
			
		<div class="tableRow">
			<p>
				Extras:
			</p>
			<p>
				<input type="checkbox" name="extras[]" value="giftwrap">Gift wrap<br />
				<input type="checkbox" name="extras[]" value="catalog" checked>Include catalog with order
			</p>
		</div>
		
		<div class="tableRow">
			<p class="heading">
				Ship to:
			</p>
			<p></p>
		</div>
		
		<div class="tableRow">
			<p>
				Name:
			</p> 
			<p>
				<input type="text" name="name">
			</p>
		</div>
		
		<div class="tableRow">
			Address: <input type="text" name="address">
			City: <input type="text" name="city">
			State: <input type="text" name="state">
			Zip: <input type="text" name="zip">
			Phone: <input type="tel" name="phone">
		</p>
		
		<p>
			Customer Comments:
			<textarea name="comments"></textarea>
		</p>
		
		<p>
			<input type="submit" value="Order Now">
		</p>
	</form>


  </body>
</html>
