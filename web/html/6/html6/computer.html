<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script type="text/javascript">
        // var a = 5; // 定义变量 a 并赋值 5
        // var b = 6; // 定义变量 b 并赋值 6
        // var c = a + b; // 定义变量 c 并赋值为 a 与 b 的和
        // alert("a 与 b 的和为：" + c); // 弹出消息框并显示消息
        // document.write("a 与 b 的和为：" + c);//将字符串输出到 HTML 文档的 body 区
        // console.log("a 与 b 的和为：" + c);//控制台输出

        // 将一个匿名函数赋值给 window.onload 属性，
        // 该函数会在 HTML 文档加载完成后执行，通常用于初始化页面
    window.onload = function() {
        var a = 5;
        var b = 6;
        var c = a + b;
        // 定义一个新的变量，其值为 id 属性为 div_id 的 DOM 元素
        var myDiv = document.getElementById("div1");
        // 设置该元素中的文本内容
        myDiv.textContent = "a 与 b 的和为：" + c;
        myDiv.style.color ="#336699";
        myDiv.style.fontSize="2em";
        myDiv.style.fontWeight="bold";
    }
    </script>
</head>
<body>
    <div id="div1"></div>
</body>
</html>
