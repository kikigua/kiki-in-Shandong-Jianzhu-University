<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script type="text/javascript">
        function count(){
            //设置两个变量分别储存第一二个文本框内容，用getElementById，结果变量为字符型
            var one =document.getElementById("text1").value;//字符型
            var two =document.getElementById("text2").value;//字符型
            var outcome=0;

            outcome=parseInt(one)+parseInt(two);//用parseInt将他变成整型，并得出求和结果

            var mydiv =document.getElementById("div1");//设置变量表示div内容
            mydiv.textContent=one+"+"+two+"="+outcome;//设置div内容
        }
    </script>
</head>
<body>
    <input type="text" value="" id="text1">+<input type="text" value="" id="text2"> <input type="button" value="="  onclick="count()">
    <div id="div1"></div>
</body>
</html>
