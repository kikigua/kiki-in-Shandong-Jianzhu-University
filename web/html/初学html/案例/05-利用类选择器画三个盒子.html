<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>利用类选择器画三个盒子</title>
    <style>
        .box{
            width: 100px;
            height: 100px;
            /* 字号 */
            font-size: 10px;
        }
        .red {
            
            /* 背景颜色 */
            background-color:red;
        }
        .green{
            
            /* 背景颜色 */
            background-color:green;
        }
    </style>
</head>
<body>
    <span class="red box">第一个盒子</span>
    <!-- 跨距 -->
    <span class="green box">第二个盒子</span>
    <!-- 跨行 -->
    <div class="red box">第三个盒子</div>

</body>
</html>
