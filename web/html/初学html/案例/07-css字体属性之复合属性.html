<!DOCTYPE html>
<html lang="en">
<head>

    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>复合属性</title>

        /* 复合属性：简写的方式 节约代码

            font: italic 700 16px 'Microsoft yahei';
        }
        
    </style>
</head>

    <div>三生三世十里桃花，代码超级牛</div>
</body>
