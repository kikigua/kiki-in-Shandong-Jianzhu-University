<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字体大小</title>
    <style>
        body {
            font-size: 16px;
            /* 字体系列 */
            font-family: 'Courier New', Courier, monospace;
            /* 字体粗细 */
            /* 700都不加单位 等价于bord都是加粗的效果 400等价于normal */
            font-weight: 700;
        }
        /* 标题标签比较特殊，需要单独制定文字大小 */
        h2 {
            font-size: 18px;
        }
        p {
            /* 斜体 */
            font-style: italic;
        }
    </style>
</head>
<body>
    <h2>pink的秘密</h2>
    <p>ui读书活动</p>
    <p>今河北省</p>
    <p>基本上不错</p>
</body>
</html>
