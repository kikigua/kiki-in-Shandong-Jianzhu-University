<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>09-css文本外观之装饰文本</title>
    <style>
        div {
            /* 下划线 */
            text-decoration: underline;
            /* line-through删除线 */
        }
        a {
            /* 删除下划线 */
            text-decoration: none;
            color: aqua;
        }
    </style>
</head>
<body>
    <div>美好的回忆</div>
    <a href="#">人之初，性本善</a>
</body>
</html>
