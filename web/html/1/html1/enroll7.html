<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录与注册</title>
</head>
<body>
    <h1>用户<a href="enroll6.html">登录</a>与<a href="enroll7.html">注册</a></h1>
    <br>
    <h2>新用户注册</h2>
    <p>用户名：<input type="text" value="请输入账号"></p>
    <p>密码：<input type="text" value="请输入密码"></p>
    <p>确认密码：<input type="text" value="请再次输入密码"></p>
    <p>真实姓名：<input type="text" value="请输入真实姓名"></p>
    <p>性别：<input type="radio" name="sex" >男<input type="radio" name="sex" value="女">女</p>
    <p>是否学生:<input type="checkbox"></p>
    <p>兴趣爱好：<input type="checkbox" name="" id="">读书<input type="checkbox" name="" id="">爬山<input type="checkbox" name="" id="">看电影<input type="checkbox" name="" id="">跑步</p>
    <p>
        年龄：<select name="old" id="">
        <option>6-12</option>
        <option>13-18</option>
        <option>19-25</option>
        <option>25以上</option>
        </select>
    </p>
    <p>
        喜欢的颜色：<select name="color" id="" size="4">
            <option>蓝色</option>
            <option>橙色</option>
            <option>绿色</option>
            <option>白色</option>
        </select>
    </p>
    <p>
        上传照片：<input type="file" name="" id="">
    </p>
    <p>
        <input type="submit" value="提交">
        <input type="reset" value="重置">
    </p>
</body>
</html>
