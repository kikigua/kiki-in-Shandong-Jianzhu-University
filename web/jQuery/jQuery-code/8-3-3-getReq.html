<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>XMLHTTPRequest对象</title>
  <style>
    #plArea{
		height: 300px;
		background:#eee;
		margin-top:5px;
		padding:20px;
		width:1000px;
		margin: 0 auto;
	}
    #plItem li{
		display:table;
		width:920px;
		margin-bottom:20px;
		padding-bottom:10px;
		border-bottom:1px solid #ddd;
	}
	#plItem li>b{
		color: red;
	}
	#plItem li>span{
		margin-left:10px;
		font-size:14px;
	}
	#plItem li>p{
		margin-top:20px;
		font-size:14px;
	}
	#plItem div{
		width:40px;
		float:right;
		
	}
	#plItem div.like>img{
		width: 20px;
		height:20px;
	}
  </style> 
</head>
<body>
<div id="plArea">
		<ul id="plItem">   
		</ul>
</div>
<script src="js/jquery-1.11.3.js"></script>
<script>
    function loadData(){
	 // $.get("data/getComment.php").then(resData=>{
	  $.get("data/getComment.php", function(resData){
		var html="";
		for(var i=0;i<resData.length;i++){
			var p=resData[i];
			html+=
			`<li><b>${p.uname}</b><span>${p.fdate}</span>
			<p>${p.comm}</p>
			<div class="like"><img src="img/like.png"/>
			<span>${p.likesCount}</span>
			</div></li>`;
		}
		$("#plItem").html(html);
	  })
   }
   
   $(function(){
	  loadData();
   });  
</script>
</body>
</html>
