<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <title>交互式应用案例-多个盒子</title>
  <style>
	div{
	  width: 40px;
	  height: 20px;
	  margin: 5px;
      float: left;
	  background-color: yellow;
	  text-align:center;
	  pointer: cursor;
	}
  </style>
 </head>
 <body>
	<div>1</div>
    <div id="btn">2</div>
    <div>3</div>
</body>
<script>
    let btn = document.getElementById('btn');
    btn.onclick = function(e){
	  alert("您单击了 "+e.target.innerHTML+" 号按钮");
	};
</script>
</html>
