<!doctype html>
<html lang="zh-cn">
 <head>
  <meta charset="UTF-8">
  <title>attr改变文本颜色</title>
  <style>
    p{
    color: blue;
    width: 200px;
    font-size: 14px;
  }
  </style>
 </head>
 <body>
    <p>鼠标悬停在我身上，变色给你看1</p>
    <p>鼠标悬停在我身上，变色给你看2</p>
 </body>
<script src="js/jquery-1.11.3.js"></script>
<script>
 $( "p" ).mouseover(function(){
   $(this).attr("style","color:red");
 });
</script>
  
</html>
