<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>event对象</title>
  <style>
    #js_output{
	   margin: 5px;
	   color: red;
	}
	#jq_output{
	    margin: 5px;
	   color: blue;
	}
	 
  </style> 
</head>
<body>
 
    <button id="js">原生javaScript事件</button>
	<div id="js_output"></div>
    <button id="jq">简化jQuery事件</button>
	<div id="jq_output"></div>
  <script src="js/jquery-1.11.3.js"></script>
  <script>
    document.getElementById("js").addEventListener("click", function(){
       document.getElementById("js_output").innerHTML = "原生js事件";
    });
	/*
    $("#jq").on('click', function (){
        $("#jq_output").html("jQuery事件");
    });
	*/
    $("#jq").click( function (event){
       $("#jq_output").html("jQuery事件");
    });
	
  </script>
</body>
</html>
