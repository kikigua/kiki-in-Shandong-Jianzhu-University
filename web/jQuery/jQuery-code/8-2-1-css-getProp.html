<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <title>获取背景颜色的值</title>
  <style>
    div{
	  width: 60px;
	  height: 60px;
	  margin: 5px;
      float: left;
	}
  </style>
 </head>
 <body>
	<div style="background-color:blue;"></div>
    <div style="background-color:yellow"></div>
    <div style="background-color:red;"></div>
	<div id="output"></div>
</body>
<script src="js/jquery-1.11.3.js"></script>
<script>
    $( "div" ).click(function() {
    var color = $( this ).css( "background-color" );
    alert( "The background-color of the div is"+color);
    });
</script>
</html>
