<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>XMLHTTPRequest对象</title>
  <style>
    button {
	  width: 200px;
	  text-align: center;
	  font-size: 16px;
	  line-height: 16px;
   }
   .teacher{
      font-weight: bold;
	  font-size: 16px; 
   }
   .course{
      color: blue;
   }   
  </style> 
</head>
<body>
  <button id="check">点我查看师资情况</button>
  <div id="container">
    
  </div>
<script src="js/jquery-1.11.3.js"></script>
<script>
    $("#check").click(function(){
      $.getJSON("data/teacher.json", function(data){
	     console.log(data);
	     var html = '';
		 $.each(data, function(index,item){
		    html += '<div class="teacher">' + item.name + '</div>'+
	                '<div class="course">主要教授' + item.teachCourses + '</div>'+
	                '<br/>';
		 })
		 $("#container").html(html);
	  });	  
	});
</script>
</body>
</html>
