<SCRIPT LANGUAGE="JavaScript">

	function openLocalContents() {
		var subWindow = window.open("index.htm")
		subWindow.focus()
	}


	function createSubWin(urlName, winType) {
	
		var browser_type = navigator.userAgent
		var date_string = new Date()
		
		if (browser_type.indexOf("MSIE") != -1) {
			// browser is IE ("MSIE" found in browser_type)
			newWinType = winType + date_string.getTime()
			newWindow = window.open(urlName, newWinType)
			newWindow.focus()
		} else {
			// browser is not IE ("MSIE" not found in browser_type)
			newWindow = window.open(urlName, winType)
			newWindow.focus()
		}
	}
